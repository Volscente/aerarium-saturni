name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-lighthouse:
    name: Build & Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: the-codex/package-lock.json

      - name: Install dependencies
        working-directory: the-codex
        run: npm ci

      - name: Build Codex
        working-directory: the-codex
        timeout-minutes: 3
        run: npm run build

      - name: Lighthouse CI
        working-directory: the-codex
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
